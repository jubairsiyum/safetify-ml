name: Keep Render Awake

on:
  schedule:
    # Every 20 minutes
    - cron: "*/20 * * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Random Delay
        run: |
          DELAY=$((RANDOM % 600))
          echo "Waiting $DELAY seconds..."
          sleep $DELAY

      - name: Ping Server
        run: |
          curl -s -o /dev/null \
          -w "HTTP Status: %{http_code}\nTotal Time: %{time_total}s\n" \
          https://safetify-ml.onrender.com/health
